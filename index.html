<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070A0E" />
  <meta name="description" content="Nova Budget: controla tus gastos fijos y variables, programa tus pagos, recibe alertas y ahorra un mínimo cada mes." />
  <title>Nova Budget — Salud financiera</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="splash" class="splash" role="status" aria-label="Cargando Nova Budget">
    <svg class="splash-mark" viewBox="0 0 512 512" width="124" height="124" aria-hidden="true">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#22C58B"/><stop offset="1" stop-color="#0b7d5e"/></linearGradient></defs>
      <circle class="s-disc" cx="256" cy="256" r="240" fill="url(#sg)"/>
      <g class="s-wallet" fill="none" stroke="#fff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
        <rect x="128" y="168" width="256" height="176" rx="34"/>
        <path d="M128 210 h200 a28 28 0 0 1 28 28 v0"/>
      </g>
      <circle cx="336" cy="256" r="26" fill="#fff"/>
      <circle cx="336" cy="256" r="10" fill="#0b7d5e"/>
      <path class="s-spark" d="M200 116 l14 34 34 14 -34 14 -14 34 -14 -34 -34 -14 34 -14z" fill="#ffe08a"/>
    </svg>
    <div class="splash-name">Nova<b>·</b>Budget</div>
    <div class="splash-tag">Tu bolsillo, bajo control</div>
  </div>

  <header class="appbar">
    <div class="appbar-inner">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">N</span>
        <div>
          <div class="brand-name">Nova<b>·</b>Budget</div>
          <div class="monthnav" id="monthNav">
            <button class="mnav" data-month="-1" aria-label="Mes anterior">‹</button>
            <button class="mlabel" id="brandMonth" data-action="month-today" title="Volver al mes actual">—</button>
            <button class="mnav" data-month="1" aria-label="Mes siguiente">›</button>
          </div>
        </div>
      </div>
      <div class="appbar-actions">
        <button class="icon-btn" id="btnBell" title="Alertas" aria-label="Alertas">
          🔔<span class="badge" id="bellBadge" hidden>0</span>
        </button>
        <button class="icon-btn" id="btnSettings" title="Ajustes" aria-label="Ajustes">⚙️</button>
      </div>
    </div>
  </header>

  <main id="view" class="view"><!-- render target --></main>

  <button class="fab" id="fab" title="Agregar" aria-label="Agregar">＋</button>

  <nav class="bottomnav" id="bottomnav">
    <button class="nav-item active" data-route="inicio">🏠<span>Inicio</span></button>
    <button class="nav-item" data-route="ingresos">💵<span>Ingresos</span></button>
    <button class="nav-item" data-route="gastos">🧾<span>Gastos</span></button>
    <button class="nav-item" data-route="mercado">🛒<span>Mercado</span></button>
    <button class="nav-item" data-route="sobres">🎯<span>Sobres</span></button>
    <button class="nav-item" data-route="stats">📊<span>Stats</span></button>
  </nav>

  <div class="modal-root" id="modalRoot" hidden></div>
  <div class="toast" id="toast" hidden></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
